version: 2

# Automates the currency that was previously maintained by hand (`pnpm bump`).
# Dependabot is pnpm-aware (updates pnpm-lock.yaml). The intentional version pins
# survive its PRs two ways: prettier is a true pre-release (4.0.0-alpha) and
# Dependabot only offers pre-release bumps for deps already on one; electron-builder
# and electron-updater sit on versions published under the `next` dist-tag that are
# AHEAD of the stable `latest` tag, and Dependabot never downgrades — it proposes
# equal-or-higher versions only, so it won't pull them back to `latest`.
updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
      open-pull-requests-limit: 10
      versioning-strategy: increase
      # pnpm 11 rejects lockfile entries younger than 24h (minimumReleaseAge,
      # default 1440 min), so a bump to a fresh release fails CI's
      # `pnpm install --frozen-lockfile`. Make Dependabot wait longer than that
      # gate so its PRs arrive already past it — 3 days also gives the ecosystem
      # time to catch malicious releases before we pull them. Cooldown is a
      # floor, not a freeze: Dependabot takes the newest version ≥3 days old.
      # (Security updates bypass cooldown by design and may still trip the gate.)
      cooldown:
          default-days: 3
      labels:
          - 'dependencies'
      groups:
          # ttsc + @ttsc/* release in lockstep and must bump together —
          # @ttsc/graph peer-depends on the EXACT ttsc version, and @ttsc/lint
          # has no peer pin at all, so a partial bump would install cleanly and
          # only fail later inside the typecheck gate. One PR for all of them;
          # listed before the catch-all groups so this match wins. Review the
          # release diff before merging (devDeps are outside the --prod audit
          # gate — see CLAUDE.md "Dependencies & Type Checking").
          ttsc-toolchain:
              patterns:
                  - 'ttsc'
                  - '@ttsc/*'
          # Batch low-risk dev-dependency minor/patch bumps into one PR.
          dev-minor-patch:
              dependency-type: 'development'
              update-types:
                  - 'minor'
                  - 'patch'
          # Batch low-risk runtime-dependency minor/patch bumps into one PR.
          prod-minor-patch:
              dependency-type: 'production'
              update-types:
                  - 'minor'
                  - 'patch'
      # Major bumps land as individual PRs so they can be reviewed one at a time.

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
      labels:
          - 'dependencies'
          - 'github-actions'
      groups:
          # Group routine action minor/patch bumps; majors (including the
          # security-sensitive github/codeql-action) land as individual PRs.
          actions:
              patterns:
                  - '*'
              update-types:
                  - 'minor'
                  - 'patch'
