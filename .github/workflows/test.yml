name: Test

on:
    push:
        branches: [master, develop, feature/*]
    pull_request:
        branches: [master, develop]

jobs:
    test:
        runs-on: ubuntu-slim

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Install pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: '26'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Audit dependencies
              # --prod scopes the gate to shipped runtime deps (the ones that
              # handle auth tokens) so an unfixable advisory in a dev-only or
              # alpha-pinned tool can't block unrelated PRs. An unresolvable prod
              # advisory can be excepted via pnpm's `auditConfig` in package.json.
              run: pnpm audit --prod --audit-level=high

            - name: Run linter
              run: pnpm lint

            - name: Type-check (JSDoc + checkJs opt-in)
              run: pnpm typecheck

            - name: Run tests with coverage
              run: pnpm test:coverage

            # Rebuild the asset BEFORE validating it. Validating only the committed
            # copy would let a PR edit lexicon-concepts.json (weights, dims, a new
            # cluster) without re-running the build and still pass — the gate would
            # be checking the stale asset, not the config under review. The build is
            # seeded and deterministic, so a clean tree here also proves the
            # committed asset matches its source.
            - name: Verify lexicon asset is up to date
              run: pnpm build:lexicon && git diff --exit-code src/assets/semantic-vectors.json

            - name: Verify lexicon separates signal from noise at the match floor
              run: pnpm verify:lexicon

            - name: Bundle size budget (renderer bundles)
              run: pnpm size

    knip:
        # knip runs on a separate, standard runner: its parser (oxc-parser)
        # allocates a ~2 GiB ArrayBuffer for raw transfer, which the
        # memory-constrained ubuntu-slim runner used by the `test` job cannot
        # satisfy (it crashes with "Array buffer allocation failed"). oxc picks
        # raw transfer purely from the platform (64-bit + Node ≥ 22) with no
        # opt-out, so the fix is more memory rather than a flag.
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Install pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: '26'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Dead-code / unused-dependency check
              run: pnpm knip
