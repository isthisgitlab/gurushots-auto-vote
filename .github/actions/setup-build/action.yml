name: Setup Build Environment
description: Repeated setup shared by test, build matrix, build-android, and create-release. Activates pnpm via corepack (pinned by the packageManager field), sets up Node 26 with pnpm cache, optionally pulls the bumped package.json artifact, and installs dependencies.

inputs:
    download-bumped:
        description: When 'true', download the bumped-package artifact uploaded by the version-bump job before installing.
        required: false
        default: 'false'
    install:
        description: When 'true' (default), run `pnpm install --frozen-lockfile`. Set 'false' for jobs that want to install differently.
        required: false
        default: 'true'

runs:
    using: composite
    steps:
        - uses: pnpm/action-setup@v6

        - uses: actions/setup-node@v6
          with:
              node-version: '26'
              cache: 'pnpm'

        - if: inputs.download-bumped == 'true'
          uses: actions/download-artifact@v8
          with:
              name: bumped-package
              path: .

        - if: inputs.install == 'true'
          shell: bash
          run: pnpm install --frozen-lockfile
